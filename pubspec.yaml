name: sky_rocket
description: "Sky Rocket — a mobile iGaming crash game where a pixel-art rocket flies upward and a multiplier increases in real time."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^13.0.0
  flame: ^1.18.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  audioplayers: ^6.0.0
  fl_chart: ^0.68.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter_native_splash:
  color: "#1A1A2E"
  image: assets/images/logo.png
  android: true
  ios: true
  android_12: 
    image: assets/images/logo.png
    color: "#1A1A2E"
    icon_background_color: "#1A1A2E"
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
