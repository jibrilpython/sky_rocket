name: sky_rocket
description: "Sky Rocket — a mobile iGaming crash game where a pixel-art rocket flies upward and a multiplier increases in real time."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^13.0.0
  flame: ^1.18.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  audioplayers: ^6.0.0
  fl_chart: ^0.68.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
